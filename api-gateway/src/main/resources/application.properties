spring.application.name=api-gateway
server.port=8080

# API Gateway - Routing Configuration
server.servlet.context-path=/

# Static resources configuration (for frontend)
spring.web.resources.static-locations=classpath:/static/

# Logging
logging.level.root=INFO
logging.level.com.example=DEBUG

# JWT Configuration
jwt.secret=${JWT_SECRET:kunci_rahasia_kamu_yang_sangat_panjang_sekali_minimal_32_karakter}

# ============================================================
# Swagger UI Aggregator — satu halaman untuk semua service
# Akses: http://localhost:8080/swagger-ui.html
# Gunakan dropdown kanan atas untuk berpindah service
# ============================================================

# Nonaktifkan auto-generate API docs Gateway sendiri (kita hanya aggregator)
# Tapi tetap harus enable agar Swagger UI bisa render
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/gateway/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Daftar service yang ditampilkan di Swagger UI
springdoc.swagger-ui.urls[0].name=1. Auth Service
springdoc.swagger-ui.urls[0].url=http://localhost:8081/v3/api-docs
springdoc.swagger-ui.urls[1].name=2. Product Service
springdoc.swagger-ui.urls[1].url=http://localhost:8082/v3/api-docs
springdoc.swagger-ui.urls[2].name=3. Customer Service
springdoc.swagger-ui.urls[2].url=http://localhost:8083/v3/api-docs
springdoc.swagger-ui.urls[3].name=4. Order Service
springdoc.swagger-ui.urls[3].url=http://localhost:8084/v3/api-docs
springdoc.swagger-ui.urls[4].name=5. Inventory Service
springdoc.swagger-ui.urls[4].url=http://localhost:8085/v3/api-docs
springdoc.swagger-ui.urls[5].name=6. Shipping Service
springdoc.swagger-ui.urls[5].url=http://localhost:8086/v3/api-docs
springdoc.swagger-ui.urls[6].name=7. Payment Service
springdoc.swagger-ui.urls[6].url=http://localhost:8087/v3/api-docs

# Service default yang tampil saat Swagger dibuka pertama kali
springdoc.swagger-ui.urls-primary-name=1. Auth Service

# Tampilkan Authorize button di atas (lebih mudah diakses)
springdoc.swagger-ui.persist-authorization=true
