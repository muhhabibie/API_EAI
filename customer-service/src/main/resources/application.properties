# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/customer_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jackson.serialization.indent_output=true

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging Configuration
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.apache.kafka=WARN
logging.level.com.example=INFO
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=${PORT:8083}
spring.application.name=customer-service

# JWT Configuration
jwt.secret=${JWT_SECRET:kunci_rahasia_kamu_yang_sangat_panjang_sekali_minimal_32_karakter}

# Internal service-to-service auth key (override via AUTH_SERVICE_INTERNAL_KEY env var di produksi)
auth.service.internal-key=${AUTH_SERVICE_INTERNAL_KEY:INTERNAL_SYSTEM_KEY_99}
